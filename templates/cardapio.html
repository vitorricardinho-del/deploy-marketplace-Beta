<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - {{ lanchonete.nome }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --vermelho-food: #EA1D2C; --fundo-dark: #111; --card-dark: #1c1c1e; }
        
        body { background-color: var(--fundo-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }

        /* CABEÇALHO DO CARDÁPIO */
        .header-cardapio {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1a1a1a, var(--fundo-dark));
            border-bottom: 1px solid #333;
        }

        .foto-perfil-cardapio {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--vermelho-food);
            box-shadow: 0 0 20px rgba(234, 29, 44, 0.3);
            margin-bottom: 15px;
        }

        .nome-loja { font-size: 24px; font-weight: 800; margin: 5px 0; }
        .desc-loja { color: #888; font-size: 14px; max-width: 400px; margin: 0 auto; }

        /* GRADE DE ITENS */
        .container-itens { padding: 20px; display: grid; gap: 15px; }

        .card-item {
            background: var(--card-dark);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            border: 1px solid #333;
            height: 120px;
        }

        .foto-item {
            width: 120px;
            height: 120px;
            object-fit: cover;
        }

        .info-item {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .titulo-item { font-size: 16px; font-weight: bold; margin: 0; }
        .desc-item { font-size: 12px; color: #aaa; margin: 4px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .preco-item { color: #2ecc71; font-weight: 800; font-size: 18px; }

        /* BOTÃO FLUTUANTE VOLTAR */
        .btn-voltar {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <a href="/" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>

    <header class="header-cardapio">
        <img src="{{ 'https://bedtrqqguxvmmjsgrswl.supabase.co/storage/v1/object/public/food_online/perfis/' + lanchonete.foto_perfil if lanchonete.foto_perfil else 'https://via.placeholder.com/150' }}" 
            class="foto-perfil-cardapio">
        
        <h1 class="nome-loja">{{ lanchonete.nome }}</h1>
        <p class="desc-loja">{{ lanchonete.descricao }}</p>
    </header>

    <div class="container-itens">
        <h3 style="color: var(--vermelho-food); margin-left: 5px;">🍔 LANCHES E PORÇÕES</h3>
        
        {% for item in itens %}
        <div class="card-item">
            <img src="{{ 'https://bedtrqqguxvmmjsgrswl.supabase.co/storage/v1/object/public/food_online/itens/' + item.imagem_url if item.imagem_url else 'https://via.placeholder.com/150' }}" 
                class="foto-item">
            
            <div class="info-item">
                <div>
                    <h4 class="titulo-item">{{ item.nome_item }}</h4>
                    <p class="desc-item">{{ item.descricao_item }}</p>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="preco-item">R$ {{ "%.2f"|format(item.preco)|replace('.', ',') }}</span>
                    
                    <a href="https://wa.me/55{{ lanchonete.whatsapp_numero|replace(' ', '')|replace('-', '') }}?text=Olá! Gostaria de pedir um *{{ item.nome_item }}*" 
                        style="color: #25d366; font-size: 20px;"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
